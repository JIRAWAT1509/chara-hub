<section class="handoff-panel">
  <div class="handoff-copy">
    <p class="eyebrow">Handoff</p>
    <h3>{{ providerHandoff().providerName }}</h3>
    <p>{{ providerHandoff().manualText }}</p>
  </div>

  <div class="handoff-actions">
    <button
      class="secondary-button"
      type="button"
      (click)="preparedPromptCopied.emit()"
      [disabled]="!handoffReady()"
    >
      Copy prepared prompt
    </button>

    @if (providerHandoff().url) {
      <button
        class="primary-button"
        type="button"
        (click)="recommendedProviderOpened.emit()"
        [disabled]="!handoffReady()"
      >
        Open {{ providerHandoff().providerName }}
      </button>
    }
  </div>

  @if (preparedPrompt() && !hasActiveSavedTask()) {
    <p class="subtle-note">
      Save the task before handoff if you want copy/open events recorded.
    </p>
  }

  @if (handoffMessage()) {
    <p class="form-message" [class.error]="handoffIsError()">{{ handoffMessage() }}</p>
  }
</section>
